project_id = "ycoach"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/login",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/login",
  "http://127.0.0.1:3000/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.analyze-meal-photo]
verify_jwt = true

[functions.coach-chat]
verify_jwt = true

[functions.generate-weekly-summary]
verify_jwt = true

[functions.generate-contextual-recommendation]
verify_jwt = true

[functions.apply-accepted-recommendation]
verify_jwt = true
